<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Satış Defteri — Özellik Grafiği (1024×500)</title>
<style>
  :root{--bg:#0A0F14;--panel:#12181F;--panel2:#1B2027;--line:#2A323C;
    --brand:#0096FF;--brandDeep:#0061A7;--brandLight:#A1C9FF;--text:#E7ECF3;--muted:#93A0AE;}
  *{box-sizing:border-box;font-family:'Segoe UI',Roboto,system-ui,sans-serif}
  body{margin:0;background:var(--bg);color:var(--text);padding:24px}
  h1{font-size:18px;font-weight:600;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  label{font-size:13px;color:var(--muted)}
  input[type=text]{background:var(--panel2);color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:8px 10px;font-size:13px;width:340px}
  button{cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--text);
    padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600}
  button:hover{border-color:var(--brand)}
  button.primary{background:var(--brandDeep);border-color:var(--brandDeep)}
  .file-pick{color:var(--brandLight);cursor:pointer;text-decoration:underline;font-size:13px}
  input[type=file]{display:none}
  canvas{width:100%;max-width:1024px;height:auto;border-radius:12px;border:1px solid var(--line);margin-top:14px;display:block}
</style>
</head>
<body>
<h1>Satış Defteri · Özellik Grafiği Stüdyosu</h1>
<div class="sub">Tam 1024 × 500 px PNG — Play Console "Özellik grafiği" alanına yüklenir</div>

<div class="row">
  <label>Başlık <input type="text" id="title" value="Satış Defteri"></label>
  <label>Alt başlık <input type="text" id="subtitle" value="Satış, alış, stok ve kasanı tek yerde"></label>
</div>
<div class="row">
  <label class="file-pick" id="logoPick">+ Logo ekle (opsiyonel, kare PNG)<input type="file" id="logoFile" accept="image/*"></label>
  <button id="themeBtn">Arka plan: Lacivert</button>
  <button class="primary" id="download">PNG indir (1024×500)</button>
</div>

<canvas id="cv" width="1024" height="500"></canvas>

<script>
const W=1024,H=500;
const THEMES={
  navy:{name:'Lacivert',a:'#06122A',b:'#0A2A55',c:'#03060F'},
  dark:{name:'Koyu',a:'#0A0F14',b:'#0C1722',c:'#06090D'},
  brand:{name:'Mavi',a:'#00284A',b:'#0061A7',c:'#001A33'},
};
const keys=Object.keys(THEMES); let ti=0; let logo=null;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');

function draw(){
  const th=THEMES[keys[ti]];
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,th.a); g.addColorStop(0.55,th.b); g.addColorStop(1,th.c);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const rg=ctx.createRadialGradient(760,140,0,760,140,560);
  rg.addColorStop(0,'rgba(0,150,255,0.22)'); rg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);

  let textX=70;
  const logoSize=200, logoX=64, logoY=(H-logoSize)/2;
  if(logo){
    ctx.save();
    const r=44;
    ctx.beginPath();
    ctx.moveTo(logoX+r,logoY); ctx.arcTo(logoX+logoSize,logoY,logoX+logoSize,logoY+logoSize,r);
    ctx.arcTo(logoX+logoSize,logoY+logoSize,logoX,logoY+logoSize,r);
    ctx.arcTo(logoX,logoY+logoSize,logoX,logoY,r); ctx.arcTo(logoX,logoY,logoX+logoSize,logoY,r);
    ctx.closePath(); ctx.clip();
    ctx.drawImage(logo,logoX,logoY,logoSize,logoSize);
    ctx.restore();
    textX=logoX+logoSize+56;
  }

  ctx.textAlign='left';
  ctx.fillStyle='#FFFFFF';
  ctx.font='700 76px Segoe UI';
  ctx.fillText(document.getElementById('title').value, textX, 250);

  ctx.fillStyle='#A8C4E6';
  ctx.font='400 36px Segoe UI';
  wrapLeft(document.getElementById('subtitle').value, textX, 312, W-textX-60, 46);
}

function wrapLeft(text,x,y,maxW,lh){
  const words=text.split(' '); let line=''; let yy=y;
  for(const w of words){
    const t=line?line+' '+w:w;
    if(ctx.measureText(t).width>maxW && line){ ctx.fillText(line,x,yy); line=w; yy+=lh; }
    else line=t;
  }
  if(line) ctx.fillText(line,x,yy);
}

document.getElementById('logoFile').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const img=new Image(); img.onload=()=>{logo=img;draw();}; img.src=URL.createObjectURL(f);
};
document.getElementById('logoPick').onclick=()=>document.getElementById('logoFile').click();
document.getElementById('themeBtn').onclick=()=>{ti=(ti+1)%keys.length;
  document.getElementById('themeBtn').textContent='Arka plan: '+THEMES[keys[ti]].name; draw();};
document.getElementById('title').oninput=draw;
document.getElementById('subtitle').oninput=draw;
document.getElementById('download').onclick=()=>{
  cv.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);
    a.download='feature_graphic_1024x500.png';a.click();},'image/png');
};
draw();
</script>
</body>
</html>
